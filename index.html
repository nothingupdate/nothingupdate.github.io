<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nothing Update - Official Bot</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        p {
            color: #a0a0a0;
            font-size: 1.1rem;
            max-width: 400px;
            line-height: 1.5;
        }
        .bot-button {
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }
        .bot-button:hover {
            background-color: #dcdcdc;
        }
    </style>
</head>
<body>

    <h1>Nothing Update</h1>
    <p>The official portal for the Nothing Update ecosystem. Stay connected with our latest firmware and system updates.</p>
    
    <a href="https://t.me/NothingUpdate_Bot" class="bot-button" target="_blank">Open Telegram Bot</a>

</body>
</html>
